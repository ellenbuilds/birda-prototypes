  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

cons.length],\n      spin: (Math.random() * 2 - 1) * 620,\n      round: Math.random() < 0.4,\n      delay: Math.random() * 130,\n    }));\n  }\n\n  buildScreen(cfg) {\n    const t = this.t;\n    const { badge, notes } = this.state;\n    const c01 = (v) => Math.max(0, Math.min(1, v));\n    const ph = (start, dur) => c01((t - start) / dur);\n    const eoC = (p) => 1 - Math.pow(1 - p, 3);\n    const eioC = (p) => (p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2);\n    const eoB = (p) => { const s = 1.9; return 1 + (s + 1) * Math.pow(p - 1, 3) + s * Math.pow(p - 1, 2); };\n\n    // ---- check circle (static) ----\n    const checkStyle = {\n      position: \"absolute\", left: cfg.checkLeft, top: 59, width: 40, height: 40,\n      borderRadius: 999, backgroundColor: \"rgb(21,131,112)\",\n      boxShadow: \"0 0 0 6px rgb(165,224,214)\",\n      display: \"flex\", alignItems: \"center\", justifyContent: \"center\",\n      boxSizing: \"border-box\", zIndex: 2,\n    };\n\n    // ---- bar fill + XP counter (optionally pausing at the diamond for the stamp) ----\n    const badgeDur = badge === \"spring\" ? 900 : badge === \"confetti\" ? 700 : 650;\n    const total = cfg.segs.reduce((a, s) => a + s.w, 0);\n    const pre = cfg.preFillPx || 0;\n    const xpStart = cfg.xpStart || 0;\n    let fillCurrent, xpVal, badgeStart, nStart, barStarted;\n    if (cfg.pauseAtHit) {\n      const p1 = eioC(ph(600, 800));\n      badgeStart = 1500;\n      const p2Start = badgeStart + badgeDur + 150;\n      const p2 = eoC(ph(p2Start, 600));\n      fillCurrent = pre + (cfg.hitPx - pre) * p1 + (total - cfg.hitPx) * p2;\n      xpVal = xpStart + (cfg.xpAtHit - xpStart) * p1 + (cfg.xpTarget - cfg.xpAtHit) * p2;\n      nStart = p2Start + 850;\n      barStarted = t > 600;\n    } else {\n      const bp = eioC(ph(600, 1100));\n      fillCurrent = pre + bp * (total - pre);\n      xpVal = xpStart + (cfg.xpTarget - xpStart) * bp;\n      badgeStart = 1750;\n      nStart = 2450;\n      barStarted = ph(600, 1100) > 0;\n    }\n    let fillPx = fillCurrent;\n    const fills = cfg.segs.map((s) => {\n      const w = Math.max(0, Math.min(s.w, fillPx));\n      fillPx -= w;\n      return {\n        position: \"absolute\", left: s.left, top: 75, width: w, height: 8,\n        borderRadius: s.r, background: \"rgb(165,224,214)\", zIndex: 1,\n      };\n    });\n    const xp = Math.round(xpVal) + \"XP\";\n\n    // middle diamond turns dark green when the fill reaches it\n    const hit = fillCurrent >= cfg.hitPx - 0.5 && barStarted;\n    const diamondStyle = {\n      position: \"absolute\", left: cfg.center - 20, top: 59, width: 40, height: 40,\n      borderRadius: 999,\n      background: hit ? \"rgb(21,131,112)\" : \"rgb(212,224,239)\",\n      boxShadow: hit ? \"0 0 0 6px rgb(165,224,214)\" : \"0 0 0 0 rgb(165,224,214)\",\n      transition: \"background 200ms ease-out, box-shadow 200ms ease-out\", zIndex: 1,\n    };\n    const diamondNumStyle = {\n      position: \"absolute\", left: cfg.center - 20, top: 66, width: 40,\n      textAlign: \"center\", fontSize: 20, fontWeight: 500, lineHeight: \"24px\",\n      color: hit ? \"rgb(250,252,254)\" : \"rgb(76,89,128)\",\n      transition: \"color 200ms ease-out\", zIndex: 1,\n    };\n\n    // ---- badge pop ----\n    const bP = ph(badgeStart, badgeDur);\n    let scale = 0, rot = 0, opacity = 0;\n    if (badge === \"spring\") {\n      scale = bP === 0 ? 0.3 : 1 - Math.exp(-4.2 * bP) * Math.cos(9 * bP) * 0.7;\n      opacity = Math.min(1, bP * 4);\n    } else if (badge === \"confetti\") {\n      scale = 0.4 + 0.6 * eoB(bP);\n      opacity = Math.min(1, bP * 5);\n    } else {\n      if (bP < 0.45) {\n        const q = bP / 0.45;\n        scale = 2.1 - 1.15 * q * q;\n        rot = -9 + 7 * q * q;\n        opacity = Math.min(1, q * 1.6);\n      } else {\n        const q = (bP - 0.45) / 0.55;\n        scale = 0.95 + 0.05 * eoB(q);\n        rot = -2 + 2 * eoC(q);\n        opacity = 1;\n      }\n    }\n    if (t < badgeStart) { scale = 0.3; opacity = 0; }\n    const badgeStyle = {\n      position: \"absolute\", left: cfg.badgeLeft, top: 0, width: 160, height: 157.752,\n      transformOrigin: \"50% 62%\",\n      transform: \"scale(\" + scale.toFixed(4) + \") rotate(\" + rot.toFixed(2) + \"deg)\",\n      opacity,\n      filter: \"drop-shadow(0px 18px 22px rgba(20,22,24,0.25))\",\n      zIndex: 2,\n    };\n\n    // stamp impact ring\n    let ringStyle = { display: \"none\" };\n    if (false && badge === \"stamp\") {\n      const rp = ph(badgeStart + 0.45 * badgeDur, 450);\n      ringStyle = {\n        position: \"absolute\", left: cfg.center - 70, top: 9, width: 140, height: 140,\n        borderRadius: 999, border: \"3px solid rgb(165,224,214)\",\n        opacity: rp === 0 || rp === 1 ? 0 : (1 - rp) * 0.8,\n        transform: \"scale(\" + (0.75 + 0.65 * eoC(rp)).toFixed(4) + \")\",\n        pointerEvents: \"none\", zIndex: 1,\n      };\n    }\n\n    // confetti particles\n    let confetti = null;\n    if ((badge === \"confetti\" || badge === \"stamp\") && cfg.conf) {\n      const cStart = badge === \"stamp\" ? badgeStart + 0.25 * badgeDur : badgeStart + 100;\n      if (t > cStart && t < cStart + 1400) {\n        confetti = cfg.conf.map((pt, i) => {\n          const pi = c01((t - cStart - pt.delay) / 950);\n          if (pi <= 0) return null;\n          const d = pt.dist * eoC(pi);\n          const x = Math.cos(pt.ang) * d;\n          const y = Math.sin(pt.ang) * d + 110 * pi * pi;\n          const op = 1 - Math.max(0, (pi - 0.55) / 0.45);\n          if (badge === \"stamp\") {\n            return React.createElement(\"img\", {\n              key: i,\n              src: pt.icon,\n              alt: \"\",\n              style: {\n                position: \"absolute\", left: x, top: y,\n                width: pt.iconSize, height: pt.iconSize,\n                opacity: op,\n                transform: \"rotate(\" + (pt.spin * pi).toFixed(1) + \"deg)\",\n                pointerEvents: \"none\",\n              },\n   const dividerBase = { height: 1, background: \"rgb(21,131,112)\", flexShrink: 0, alignSelf: \"stretch\", transformOrigin: \"0 50%\" };\n    const dividerStyle = notes === \"drawin\"\n      ? { ...dividerBase, transform: \"scaleX(\" + eoC(ph(nStart, 300)).toFixed(4) + \")\" }\n      : dividerBase;\n\n    const rows = cfg.rows.map((r, i) => {\n      const isTotal = r[0] === \"Total XP\";\n      const isLast = i === cfg.rows.length - 1;\n      let anim = {};\n      let valueText = r[1];\n      let valueOpacity = 1;\n      if (notes === \"cascade\") {\n        const rp = ph(nStart + 80 + i * 90, 380);\n        anim = { opacity: Math.min(1, rp * 2), transform: \"translateY(\" + ((1 - eoC(rp)) * 14).toFixed(2) + \"px)\" };\n        const m = /^([+]?)(\\d+)$/.exec(r[1]);\n        if (m) {\n          const vp = eoC(ph(nStart + 140 + i * 90, 420));\n          valueText = m[1] + Math.round(parseInt(m[2], 10) * vp);\n        }\n      } else if (notes === \"drawin\") {\n        const rp = ph(nStart + 180 + i * 80, 320);\n        anim = { opacity: Math.min(1, rp * 2), transform: \"translateX(\" + ((1 - eoC(rp)) * -18).toFixed(2) + \"px)\" };\n        valueOpacity = eoC(ph(nStart + 300 + i * 80, 260));\n      }\n      return {\n        label: r[0],\n        value: valueText,\n        rowStyle: {\n          position: \"relative\", height: 43,\n          borderBottom: isLast ? \"none\" : \"1px solid rgb(228,232,240)\",\n          display: \"flex\", flexDirection: \"row\", padding: \"12px 0\",\n          justifyContent: \"space-between\", alignItems: \"flex-end\",\n          boxSizing: \"border-box\", flexShrink: 0, alignSelf: \"stretch\",\n          ...anim,\n        },\n        labelStyle: {\n          fontWeight: isTotal ? 500 : 400, fontSize: 16, lineHeight: \"100%\",\n          whiteSpace: \"nowrap\", color: isTotal ? \"rgb(45,49,66)\" : \"rgb(76,89,128)\",\n        },\n        valueStyle: {\n          fontWeight: 500, fontSize: 16, lineHeight: \"100%\",\n          whiteSpace: \"nowrap\", color: \"rgb(21,131,112)\", opacity: valueOpacity,\n        },\n      };\n    });\n\n    // ---- dunnock card (screen A only) ----\n    let dunnockStyle = null;\n    let dunnockImgStyle = null;\n    let afterNotes = notesEnd;\n    if (cfg.hasDunnock) {\n      const dS = notesEnd + 100;\n      const p = ph(dS, 500);\n      dunnockStyle = {\n        position: \"relative\", height: 83, borderRadius: 16, backgroundColor: \"rgb(255,255,255)\",\n        boxShadow: \"inset 0 0 0 1px rgb(196,199,215)\",\n        display: \"flex\", flexDirection: \"row\", padding: \"16px 16px 16px 96px\",\n        alignItems: \"flex-start\", boxSizing: \"border-box\", flexShrink: 0, alignSelf: \"stretch\",\n        opacity: p === 0 ? 0 : Math.min(1, p * 2.2),\n        transform: \"translateX(\" + ((1 - eoC(p)) * -16).toFixed(2) + \"px)\",\n      };\n      // mini card settles into its tilt just after the card lands\n      const ip = ph(dS + 180, 420);\n      dunnockImgStyle = {\n        position: \"absolute\", left: -6, top: -14, width: 92, height: 115.6, display: \"block\",\n        filter: \"drop-shadow(0px 2.27px 2.27px rgba(0,0,0,0.15))\",\n        transformOrigin: \"20% 90%\",\n        transform: \"rotate(\" + ((1 - eoC(ip)) * -5).toFixed(2) + \"deg)\",\n      };\n      afterNotes = dS + 500;\n    }\n\n    // ---- button ----\n    const bS = afterNotes + 120;\n    const btnP = ph(bS, 400);\n    const buttonStyle = {\n      position: \"relative\", height: 48, borderRadius: 4, backgroundColor: \"rgb(31,135,254)\",\n      display: \"flex\", flexDirection: \"row\", gap: 8, padding: \"16px 24px\",\n      justifyContent: \"center\", alignItems: \"center\", boxSizing: \"border-box\",\n      flexShrink: 0, alignSelf: \"stretch\", cursor: \"pointer\",\n      opacity: btnP === 0 ? 0 : Math.min(1, btnP * 2),\n      transform: \"translateY(\" + ((1 - eoC(btnP)) * 14).toFixed(2) + \"px)\",\n    };\n\n    const out = {\n      checkStyle, xp, badgeStyle, ringStyle, confetti, diamondStyle, diamondNumStyle, bonusStyle,\n      cardStyle, dividerStyle, rows, dunnockStyle, dunnockImgStyle, buttonStyle,\n      fill1Style: fills[0],\n    };\n    if (fills[1]) out.fill2Style = fills[1];\n    return out;\n  }\n\n  segStyle(sel) {\n    return {\n      padding: \"7px 14px\", borderRadius: 6, cursor: \"pointer\",\n      fontSize: 13, fontWeight: 500, letterSpacing: \"0.2px\", userSelect: \"none\",\n      color: sel ? \"rgb(255,255,255)\" : \"rgb(76,89,128)\",\n      background: sel ? \"rgb(21,131,112)\" : \"transparent\",\n      transition: \"background 150ms, color 150ms\",\n    };\n  }\n\n  renderVals() {\n    const A = this.buildScreen({\n      checkLeft: 9,\n      badgeLeft: 87.209,\n      center: 167.2,\n      segs: [{ left: 49, w: 118, r: \"0 99px 99px 0\" }],\n      hitPx: 98,\n      xpTarget: 50,\n      hasNotes: false,\n      hasDunnock: true,\n      conf: this.confA,\n      rows: [[\"1 new card\", \"+30\"], [\"First card bonus\", \"+20\"], [\"Total XP\", \"50\"]],\n    });\n    const B = this.buildScreen({\n      checkLeft: 120,\n      badgeLeft: 198.209,\n      center: 278.2,\n      segs: [{ left: 0, w: 118, r: \"0\" }, { left: 160, w: 201, r: \"0 99px 99px 0\" }],\n      hitPx: 216,\n      xpStart: 50,\n      xpAtHit: 150,\n      preFillPx: 118,\n      pauseAtHit: true,\n      xpTarget: 185,\n      hasNotes: true,\n      hasDunnock: false,\n      conf: this.confB,\n      rows: [[\"3 new cards\", \"+90\"], [\"8 birds re-logged\", \"+24\"], [\"1 card upgraded\", \"+15\"], [\"2 photos added\", \"+6\"], [\"0 sessions completed\", \"-\"], [\"Total XP\", \"+135\"]],\n    });\n\n    const mkOpts = (key, opts) => opts.map(([id, label]) => ({\n      label,\n      style: this.segStyle(this.state[key] === id),\n      onClick: () => { this.setState({ [key]: id }, this.replay); },\n    }));\n\n    return {\n      A, B,\n      replay: this.replay,\n      badgeOpts: mkOpts(\"badge\", [[\"spring\", \"Spring pop\"], [\"confetti\", \"Confetti\"], [\"stamp\", \"Stamp\"]]),\n      notesOpts: mkOpts(\"notes\", [[\"cascade\", \"Cascade\"], [\"slideup\", \"Slide up\"], [\"drawin\", \"Draw in\"]]),\n      speedOpts: [[false, \"1\\u00d7\"], [true, \"Slow-mo\"]].map(([v, label]) => ({\n        label,\n        style: this.segStyle(this.state.slow === v),\n        onClick: () => { this.setState({ slow: v }, this.replay); },\n      })),\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
  </script>
